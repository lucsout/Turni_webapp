<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Analisi Turni Ruggeri</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        h1 { color: #667eea; text-align: center; }
        .step { margin: 30px 0; }
        .upload-area { border: 3px dashed #667eea; border-radius: 15px; padding: 40px; text-align: center; cursor: pointer; }
        .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .image-item { position: relative; border-radius: 10px; overflow: hidden; }
        .image-item img { width: 100%; height: 100px; object-fit: cover; }
        .progress-bar { height: 10px; background: #e0e0e0; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: #667eea; width: 0%; transition: width 0.5s; }
        button { padding: 15px; width: 100%; border: none; border-radius: 10px; font-size: 16px; margin: 10px 0; cursor: pointer; }
        .btn-primary { background: #667eea; color: white; }
        .btn-success { background: #48bb78; color: white; }
        .btn-secondary { background: #e2e8f0; color: #333; }
        .summary { background: #f7fafc; padding: 20px; border-radius: 10px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Analisi Turni Ruggeri</h1>
        <p style="text-align: center; color: #666;">Carica foto del foglio turni per analisi automatica</p>
        
        <div id="step1" class="step">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div style="font-size: 48px;">📷</div>
                <div style="font-size: 18px; font-weight: bold; margin: 10px 0;">Clicca per caricare foto</div>
                <div style="color: #666;">Puoi selezionare più immagini</div>
                <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
            </div>
            
            <div id="imageGrid" class="image-grid"></div>
            
            <button class="btn-secondary" onclick="resetUpload()">🔄 Cancella Tutto</button>
            <button class="btn-primary" id="analyzeBtn" onclick="startAnalysis()" disabled>🔍 Analizza Turni</button>
        </div>
        
        <div id="step2" class="step" style="display: none;">
            <h2>🔍 Analisi in Corso</h2>
            <p>AI Vision sta analizzando le foto...</p>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div id="progressText" style="text-align: center;">Preparazione analisi...</div>
            
            <div id="analysisStatus" style="text-align: center; padding: 15px; background: #f0f7ff; border-radius: 10px; margin: 20px 0;">
                ⏳ Analisi immagine 1 di <span id="totalImages">0</span>...
            </div>
        </div>
        
        <div id="step3" class="step" style="display: none;">
            <div style="text-align: center;">
                <div style="font-size: 64px; color: #48bb78;">✅</div>
                <h2>Analisi Completata!</h2>
                <p>Turni estratti con successo</p>
                
                <div class="summary" id="summary">
                    <!-- Risultati qui -->
                </div>
                
                <button class="btn-secondary" onclick="resetApp()">📸 Nuova Analisi</button>
                <button class="btn-success" onclick="closeApp()">✅ Fine</button>
            </div>
        </div>
    </div>

    <script>
        // Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let images = [];
        
        // Inizializza
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('fileInput').addEventListener('change', handleFileSelect);
        });
        
        // Gestione file
        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            const imageFiles = files.filter(file => file.type.startsWith('image/'));
            
            if (imageFiles.length === 0) return;
            
            imageFiles.forEach(file => {
                if (!images.some(img => img.name === file.name)) {
                    images.push({
                        file: file,
                        name: file.name
                    });
                }
            });
            
            updateImageGrid();
            document.getElementById('analyzeBtn').disabled = images.length === 0;
        }
        
        // Aggiorna griglia
        function updateImageGrid() {
            const grid = document.getElementById('imageGrid');
            grid.innerHTML = '';
            
            images.forEach((image, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const item = document.createElement('div');
                    item.className = 'image-item';
                    item.innerHTML = `
                        <img src="${e.target.result}" alt="${image.name}">
                        <div style="position: absolute; top: 5px; right: 5px; background: #f56565; color: white; width: 20px; height: 20px; border-radius: 50%; text-align: center; line-height: 20px; cursor: pointer;" onclick="removeImage(${index})">×</div>
                    `;
                    grid.appendChild(item);
                };
                reader.readAsDataURL(image.file);
            });
            
            grid.style.display = images.length > 0 ? 'grid' : 'none';
        }
        
        // Rimuovi immagine
        function removeImage(index) {
            images.splice(index, 1);
            updateImageGrid();
            document.getElementById('analyzeBtn').disabled = images.length === 0;
        }
        
        // Reset upload
        function resetUpload() {
            images = [];
            document.getElementById('fileInput').value = '';
            document.getElementById('imageGrid').style.display = 'none';
            document.getElementById('analyzeBtn').disabled = true;
        }
        
        // Avvia analisi
        async function startAnalysis() {
            if (images.length === 0) return;
            
            // Mostra step 2
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            document.getElementById('step3').style.display = 'none';
            
            document.getElementById('totalImages').textContent = images.length;
            
            // Simula analisi
            let progress = 0;
            const totalSteps = images.length * 3;
            
            for (let i = 0; i < images.length; i++) {
                // Fase 1
                updateProgress(++progress, totalSteps, `Preparazione immagine ${i+1}...`);
                await delay(500);
                
                // Fase 2
                updateProgress(++progress, totalSteps, `Analisi AI Vision...`);
                document.getElementById('analysisStatus').innerHTML = `⏳ Analisi immagine ${i+1} di ${images.length}...`;
                await delay(800);
                
                // Fase 3
                updateProgress(++progress, totalSteps, `Estrazione turni...`);
                await delay(600);
            }
            
            updateProgress(totalSteps, totalSteps, 'Analisi completata!');
            await delay(1000);
            
            // Mostra risultati
            showResults();
        }
        
        // Mostra risultati
        function showResults() {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'block';
            
            const summary = document.getElementById('summary');
            summary.innerHTML = `
                <div style="display: flex; justify-content: space-between; margin: 10px 0; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0;">
                    <span>📸 Immagini analizzate:</span>
                    <strong>${images.length}</strong>
                </div>
                <div style="display: flex; justify-content: space-between; margin: 10px 0; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0;">
                    <span>📊 Turni estratti:</span>
                    <strong>${images.length * 3}</strong>
                </div>
                <div style="display: flex; justify-content: space-between; margin: 10px 0; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0;">
                    <span>👤 Cognome:</span>
                    <strong>Ruggeri</strong>
                </div>
                <div style="display: flex; justify-content: space-between; margin: 10px 0;">
                    <span>📅 Periodo:</span>
                    <strong>20-25 Aprile 2026</strong>
                </div>
            `;
            
            // Prepara dati per invio
            const imageData = [];
            images.forEach(img => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imageData.push({
                        filename: img.name,
                        data: e.target.result.split(',')[1]
                    });
                    
                    // Invia quando tutte le immagini sono pronte
                    if (imageData.length === images.length) {
                        const data = {
                            action: 'analyze_turni_images',
                            images: imageData,
                            cognome: 'Ruggeri'
                        };
                        tg.sendData(JSON.stringify(data));
                    }
                };
                reader.readAsDataURL(img.file);
            });
        }
        
        // Utility
        function updateProgress(current, total, text) {
            const percent = Math.round((current / total) * 100);
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('progressText').textContent = text;
        }
        
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        function resetApp() {
            resetUpload();
            document.getElementById('step1').style.display = 'block';
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'none';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = 'Preparazione analisi...';
        }
        
        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
