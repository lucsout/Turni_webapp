<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 Turni Lavoro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; background: #f5f5f7; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #667eea; text-align: center; margin-bottom: 20px; }
        .section { margin-bottom: 25px; }
        .section-title { font-weight: bold; margin-bottom: 10px; color: #333; }
        .days { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .day { padding: 12px; text-align: center; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
        .day.selected { background: #667eea; color: white; border-color: #5566cc; }
        .shifts { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .shift { padding: 15px; text-align: center; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
        .shift.selected { background: #48bb78; color: white; border-color: #38a169; }
        button { padding: 16px; width: 100%; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .submit { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { text-align: center; padding: 10px; margin-top: 15px; border-radius: 8px; display: none; }
        .success { background: #d4edda; color: #155724; display: block !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Turni Lavoro</h1>
        
        <div class="section">
            <div class="section-title">Seleziona Giorno:</div>
            <div class="days">
                <div class="day" data-date="2026-04-20">Lun 20</div>
                <div class="day" data-date="2026-04-21">Mar 21</div>
                <div class="day" data-date="2026-04-22">Mer 22</div>
                <div class="day" data-date="2026-04-23">Gio 23</div>
                <div class="day" data-date="2026-04-24">Ven 24</div>
                <div class="day" data-date="2026-04-25">Sab 25</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">Seleziona Turno:</div>
            <div class="shifts">
                <div class="shift" data-shift="mattina">🌅 Mattina</div>
                <div class="shift" data-shift="pomeriggio">🌞 Pomeriggio</div>
                <div class="shift" data-shift="notte">🌙 Notte</div>
                <div class="shift" data-shift="libero">🏖️ Libero</div>
                <div class="shift" data-shift="recupero">🔄 Recupero</div>
                <div class="shift" data-shift="festivo">🎉 Festivo</div>
            </div>
        </div>
        
        <button class="submit" id="submitBtn" disabled>📤 Invia Turni</button>
        
        <div class="status" id="status"></div>
    </div>

    <script>
        // Inizializza Telegram
        if (typeof Telegram !== 'undefined') {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }
        
        let selectedDate = null;
        let selectedShift = null;
        
        // Selezione giorni
        document.querySelectorAll('.day').forEach(day => {
            day.addEventListener('click', function() {
                document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
                this.classList.add('selected');
                selectedDate = this.dataset.date;
                updateSubmitButton();
            });
        });
        
        // Selezione turni
        document.querySelectorAll('.shift').forEach(shift => {
            shift.addEventListener('click', function() {
                document.querySelectorAll('.shift').forEach(s => s.classList.remove('selected'));
                this.classList.add('selected');
                selectedShift = this.dataset.shift;
                updateSubmitButton();
            });
        });
        
        // Aggiorna pulsante
        function updateSubmitButton() {
            const btn = document.getElementById('submitBtn');
            if (selectedDate && selectedShift) {
                btn.disabled = false;
                btn.textContent = `📤 Invia ${selectedDate} (${selectedShift})`;
            }
        }
        
        // Invia dati
        document.getElementById('submitBtn').addEventListener('click', function() {
            if (!selectedDate || !selectedShift) return;
            
            const data = {
                action: 'salva_turni',
                turni: [{
                    data: selectedDate,
                    turno: selectedShift,
                    note: 'Inserito via Web App'
                }]
            };
            
            showStatus('Invio in corso...', 'success');
            
            // Invia a Telegram
            if (typeof Telegram !== 'undefined') {
                Telegram.WebApp.sendData(JSON.stringify(data));
                setTimeout(() => {
                    Telegram.WebApp.close();
                }, 1500);
            } else {
                showStatus('Dati pronti: ' + JSON.stringify(data), 'success');
            }
        });
        
        // Mostra status
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
            
            if (type !== 'loading') {
                setTimeout(() => {
                    status.style.display = 'none';
                }, 3000);
            }
        }
        
        console.log('Web App SINGLE FILE caricata');
    </script>
</body>
</html>
